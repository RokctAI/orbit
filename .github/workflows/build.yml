name: Build & Release
permissions: write-all

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      backfill_ai_notes_cutoff_version:
        type: string
        default: ""
        description: "Regenerate AI release notes starting from this version"

jobs:
  build:
    uses: RokctAI/shared-workflows/.github/workflows/universal-pipeline.yml@main
    with:
      project_type: 'python'
      backfill_ai_notes_cutoff_version: ${{ inputs.backfill_ai_notes_cutoff_version }}
      release_strategy: 'weekly'
    secrets: inherit
